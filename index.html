<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── Design tokens ─────────────────────────────────────── */
  :root {
    --cream:     #faf7f2;
    --parchment: #f0ead8;
    --gold:      #c8933a;
    --gold-lt:   #e8b86d;
    --rust:      #a04a2f;
    --forest:    #2d4a3e;
    --charcoal:  #2a2520;
    --ink:       #3d3530;
    --muted:     #7a6e65;
    --border:    #ddd5c4;
    --card-bg:   #ffffff;
    --shadow:    0 2px 12px rgba(42,37,32,.08);
    --shadow-lg: 0 6px 28px rgba(42,37,32,.13);
    --radius:    10px;
    --font-head: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  /* ── Reset & base ──────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.55;
  }

  /* ── Header ────────────────────────────────────────────── */
  header {
    background: var(--forest);
    color: var(--cream);
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: 0 2px 16px rgba(0,0,0,.22);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: var(--font-head);
    font-size: 1.45rem;
    font-weight: 600;
    letter-spacing: .01em;
    color: var(--gold-lt);
    white-space: nowrap;
  }
  header h1 span { color: var(--cream); font-weight: 400; }

  /* passphrase row */
  .passphrase-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .passphrase-row label {
    font-size: .75rem;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: rgba(250,247,242,.6);
  }
  #passphrase-input {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 6px;
    color: var(--cream);
    font-family: var(--font-body);
    font-size: .85rem;
    padding: 5px 10px;
    width: 160px;
    outline: none;
    transition: border-color .2s, background .2s;
  }
  #passphrase-input::placeholder { color: rgba(250,247,242,.35); }
  #passphrase-input:focus {
    border-color: var(--gold-lt);
    background: rgba(255,255,255,.16);
  }

  /* status badge */
  #sync-status {
    font-size: .72rem;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: .04em;
    white-space: nowrap;
    transition: background .25s, color .25s;
  }
  #sync-status.idle     { background: rgba(255,255,255,.08); color: rgba(250,247,242,.5); }
  #sync-status.loading  { background: rgba(200,147,58,.2);   color: var(--gold-lt); }
  #sync-status.saving   { background: rgba(200,147,58,.2);   color: var(--gold-lt); }
  #sync-status.saved    { background: rgba(45,74,62,.6);      color: #8ec9a8; }
  #sync-status.error    { background: rgba(160,74,47,.35);    color: #f4a68a; }
  #sync-status.auth-err { background: rgba(160,74,47,.5);    color: #f4a68a; font-weight: 600; }

  /* ── Tabs ──────────────────────────────────────────────── */
  .tab-bar {
    background: var(--parchment);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 16px;
    gap: 2px;
  }
  .tab-btn {
    font-family: var(--font-body);
    font-size: .78rem;
    font-weight: 500;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2.5px solid transparent;
    padding: 11px 14px 9px;
    cursor: pointer;
    transition: color .18s, border-color .18s;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { color: var(--forest); border-color: var(--forest); font-weight: 600; }

  /* ── Main content ──────────────────────────────────────── */
  main { max-width: 640px; margin: 0 auto; padding: 20px 16px 80px; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Section headers ───────────────────────────────────── */
  .section-title {
    font-family: var(--font-head);
    font-size: 1rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .04em;
    text-transform: uppercase;
    margin: 24px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .count {
    font-family: var(--font-body);
    font-size: .7rem;
    font-weight: 500;
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1px 8px;
    color: var(--muted);
  }

  /* ── Person cards ──────────────────────────────────────── */
  .people-list { display: flex; flex-direction: column; gap: 8px; }

  .person-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 14px;
    box-shadow: var(--shadow);
    transition: box-shadow .2s, transform .15s;
    animation: cardIn .25s ease both;
  }
  .person-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-row { display: flex; align-items: flex-start; gap: 10px; }
  .card-info { flex: 1; min-width: 0; }

  .card-name {
    font-family: var(--font-head);
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--charcoal);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-date {
    font-size: .8rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .card-date .days-badge {
    display: inline-block;
    margin-left: 7px;
    font-size: .7rem;
    font-weight: 600;
    padding: 1px 7px;
    border-radius: 20px;
    vertical-align: middle;
  }
  .days-badge.soon  { background: #fef3d0; color: #a06c10; border: 1px solid #f0d080; }
  .days-badge.today { background: #fde8e0; color: var(--rust); border: 1px solid #f0b090; }
  .days-badge.past  { background: #e8f4ed; color: var(--forest); border: 1px solid #b0d8be; }

  /* uncertain flag */
  .uncertain-flag {
    font-size: .68rem;
    font-weight: 500;
    color: var(--muted);
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* card actions */
  .card-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: .85rem;
    color: var(--muted);
    transition: background .15s, color .15s, border-color .15s;
  }
  .btn-icon:hover { background: var(--parchment); color: var(--ink); }
  .btn-icon.delete:hover { background: #fde8e0; color: var(--rust); border-color: #f0b090; }

  /* gift toggle */
  .gift-toggle {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .04em;
    cursor: pointer;
    font-family: var(--font-body);
    color: var(--muted);
    transition: all .15s;
    white-space: nowrap;
  }
  .gift-toggle:hover { border-color: var(--gold); color: var(--gold); }
  .gift-toggle.given {
    background: #f0f8f2;
    border-color: #7cc49a;
    color: var(--forest);
  }

  /* gift notes expand */
  .gift-notes-area {
    margin-top: 8px;
    display: none;
  }
  .gift-notes-area.open { display: block; }
  .gift-notes-area textarea {
    width: 100%;
    font-family: var(--font-body);
    font-size: .82rem;
    color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    resize: vertical;
    min-height: 58px;
    background: var(--parchment);
    outline: none;
    transition: border-color .18s;
  }
  .gift-notes-area textarea:focus { border-color: var(--gold); background: #fff; }
  .gift-notes-area textarea::placeholder { color: var(--muted); opacity: .6; }

  /* ── Age display ───────────────────────────────────────── */
  .card-age {
    font-size: .72rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 1px;
  }

  /* ── Empty states ──────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: .88rem;
  }
  .empty-state .big { font-size: 2rem; margin-bottom: 10px; }

  /* ── FAB add button ────────────────────────────────────── */
  #fab-add {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--forest);
    color: var(--cream);
    font-size: 1.5rem;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(0,0,0,.25);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .18s, transform .15s;
    z-index: 90;
  }
  #fab-add:hover { background: #1e3329; transform: scale(1.07); }

  /* ── Modal ─────────────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(42,37,32,.5);
    backdrop-filter: blur(2px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card-bg);
    border-radius: 14px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: modalIn .2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    background: var(--forest);
    color: var(--cream);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 {
    font-family: var(--font-head);
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--gold-lt);
  }
  .modal-close {
    background: none;
    border: none;
    color: rgba(250,247,242,.6);
    font-size: 1.3rem;
    cursor: pointer;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color .15s;
  }
  .modal-close:hover { color: var(--cream); }

  .modal-body { padding: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: .75rem;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .form-group input[type="text"],
  .form-group select {
    width: 100%;
    font-family: var(--font-body);
    font-size: .92rem;
    color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 11px;
    background: var(--parchment);
    outline: none;
    transition: border-color .18s, background .18s;
    appearance: none;
    -webkit-appearance: none;
  }
  .form-group input:focus,
  .form-group select:focus { border-color: var(--gold); background: #fff; }

  .date-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .form-group.checkbox-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .form-group.checkbox-group label {
    font-size: .85rem;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    color: var(--ink);
    margin: 0;
    cursor: pointer;
  }
  .form-group.checkbox-group input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--forest);
    cursor: pointer;
    flex-shrink: 0;
  }

  /* radio group */
  .radio-row { display: flex; gap: 16px; }
  .radio-row label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: .88rem;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
    color: var(--ink);
    cursor: pointer;
  }
  .radio-row input[type="radio"] { accent-color: var(--forest); }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 0 20px 20px;
  }
  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 18px;
    font-family: var(--font-body);
    font-size: .88rem;
    color: var(--muted);
    cursor: pointer;
    transition: background .15s;
  }
  .btn-cancel:hover { background: var(--parchment); }
  .btn-save {
    background: var(--forest);
    border: none;
    border-radius: 7px;
    padding: 8px 22px;
    font-family: var(--font-body);
    font-size: .88rem;
    font-weight: 600;
    color: var(--cream);
    cursor: pointer;
    transition: background .15s;
  }
  .btn-save:hover { background: #1e3329; }
  .btn-save:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Gift Status tab ───────────────────────────────────── */
  .gift-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
    margin-top: 16px;
  }
  .gift-stat {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .gift-stat .num {
    font-family: var(--font-head);
    font-size: 2rem;
    font-weight: 600;
    color: var(--forest);
    line-height: 1;
  }
  .gift-stat .lbl {
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }
  .gift-stat.highlight .num { color: var(--rust); }

  .gift-list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
    box-shadow: var(--shadow);
  }
  .gift-list-item .gi-name { flex: 1; font-size: .92rem; font-weight: 500; }
  .gift-list-item .gi-note { font-size: .78rem; color: var(--muted); font-style: italic; margin-top: 1px; }
  .gi-check { font-size: 1rem; }

  /* ── Loading overlay ───────────────────────────────────── */
  #loading-overlay {
    display: none;
    position: fixed; inset: 0;
    background: var(--cream);
    z-index: 300;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #loading-overlay.visible { display: flex; }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--forest);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-overlay p {
    font-family: var(--font-head);
    font-size: 1rem;
    color: var(--muted);
  }

  /* ── Responsive ────────────────────────────────────────── */
  @media (max-width: 480px) {
    header h1 { font-size: 1.15rem; }
    #passphrase-input { width: 130px; }
    .gift-summary { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay" class="visible">
  <div class="spinner"></div>
  <p>Loading birthdays…</p>
</div>

<!-- Header -->
<header>
  <h1>🎂 <span>Birthday</span> Tracker</h1>
  <div class="passphrase-row">
    <label for="passphrase-input">Key</label>
    <input type="password" id="passphrase-input" placeholder="passphrase" autocomplete="off">
    <span id="sync-status" class="idle">—</span>
  </div>
</header>

<!-- Tabs -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="all">All Birthdays</button>
  <button class="tab-btn" data-tab="coming">Coming Up</button>
  <button class="tab-btn" data-tab="gifts">Gift Status</button>
</div>

<!-- Main content -->
<main>

  <!-- ALL BIRTHDAYS tab -->
  <div id="tab-all" class="tab-panel active">
    <div>
      <div class="section-title">Kids <span class="count" id="count-kids">0</span></div>
      <div class="people-list" id="list-kids"></div>
    </div>
    <div>
      <div class="section-title">Adults <span class="count" id="count-adults">0</span></div>
      <div class="people-list" id="list-adults"></div>
    </div>
  </div>

  <!-- COMING UP tab -->
  <div id="tab-coming" class="tab-panel">
    <div class="section-title">Next 60 Days <span class="count" id="count-coming">0</span></div>
    <div class="people-list" id="list-coming"></div>
  </div>

  <!-- GIFT STATUS tab -->
  <div id="tab-gifts" class="tab-panel">
    <div class="gift-summary">
      <div class="gift-stat">
        <div class="num" id="stat-given">0</div>
        <div class="lbl">Given ✓</div>
      </div>
      <div class="gift-stat highlight">
        <div class="num" id="stat-todo">0</div>
        <div class="lbl">Still needed</div>
      </div>
    </div>
    <div class="section-title">Given</div>
    <div id="gift-list-given"></div>
    <div class="section-title" style="margin-top:20px">Still needed</div>
    <div id="gift-list-todo"></div>
  </div>

</main>

<!-- FAB -->
<button id="fab-add" title="Add person">+</button>

<!-- Add person modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Person</h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="new-name" placeholder="Full name">
      </div>
      <div class="form-group">
        <label>Group</label>
        <div class="radio-row">
          <label><input type="radio" name="group" value="kids" checked> Kids</label>
          <label><input type="radio" name="group" value="adults"> Adults</label>
        </div>
      </div>
      <div class="form-group">
        <label>Birthday</label>
        <div class="date-row">
          <select id="new-month">
            <option value="">Month</option>
            <option value="1">January</option><option value="2">February</option>
            <option value="3">March</option><option value="4">April</option>
            <option value="5">May</option><option value="6">June</option>
            <option value="7">July</option><option value="8">August</option>
            <option value="9">September</option><option value="10">October</option>
            <option value="11">November</option><option value="12">December</option>
          </select>
          <select id="new-day">
            <option value="">Day</option>
          </select>
          <select id="new-year">
            <option value="">Year</option>
          </select>
        </div>
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" id="new-uncertain">
        <label for="new-uncertain">Birthday date is uncertain / approximate</label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-save" id="modal-save">Add Person</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  CONFIG — paste your Apps Script deployment URL here
// ════════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbz9G-9hpxNGv9uK4I0boBH-vJj9XZfbYNn_S7kKazxBOpOEueWXxYupvbF0EAU-N7zH/exec';

// ════════════════════════════════════════════════════════════
//  State
// ════════════════════════════════════════════════════════════
let people = [];   // [{ id, name, dob, group, uncertain, noYear }]
let gifts  = {};   // { id: { given, what } }

// ════════════════════════════════════════════════════════════
//  Passphrase helpers
// ════════════════════════════════════════════════════════════
async function getPassphraseHash() {
  const val = document.getElementById('passphrase-input').value.trim();
  if (!val) return '';
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function savePassphraseLocally() {
  const val = document.getElementById('passphrase-input').value;
  localStorage.setItem('btPassphrase', val);
}

function loadPassphraseLocally() {
  const saved = localStorage.getItem('btPassphrase');
  if (saved) document.getElementById('passphrase-input').value = saved;
}

// ════════════════════════════════════════════════════════════
//  Status indicator
// ════════════════════════════════════════════════════════════
function setStatus(type, msg) {
  const el = document.getElementById('sync-status');
  el.className = type;
  el.textContent = msg;
}

let savedTimer = null;
function flashSaved() {
  setStatus('saved', 'Saved ✓');
  clearTimeout(savedTimer);
  savedTimer = setTimeout(() => setStatus('idle', '—'), 2500);
}

// ════════════════════════════════════════════════════════════
//  API calls
// ════════════════════════════════════════════════════════════
async function apiGet(action) {
  const hash = await getPassphraseHash();
  const url  = `${API_URL}?action=${action}&passphrase=${encodeURIComponent(hash)}`;
  const res  = await fetch(url);
  const data = await res.json();
  if (data.error === 'Unauthorized') throw new Error('auth');
  if (data.error) throw new Error(data.error);
  return data;
}

async function apiPost(body) {
  const hash = await getPassphraseHash();
  const res  = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, passphrase: hash })
  });
  const data = await res.json();
  if (data.error === 'Unauthorized') throw new Error('auth');
  if (data.error) throw new Error(data.error);
  return data;
}

// ════════════════════════════════════════════════════════════
//  Load data
// ════════════════════════════════════════════════════════════
async function loadAll() {
  document.getElementById('loading-overlay').classList.add('visible');
  setStatus('loading', 'Loading…');
  try {
    const [rawPeople, rawGifts] = await Promise.all([
      apiGet('getPeople'),
      apiGet('getGifts')
    ]);

    // Normalise people
    people = rawPeople.map(p => ({
      id:        Number(p.id),
      name:      String(p.name || ''),
      dob:       String(p.dob  || ''),
      group:     String(p.group || 'adults'),
      uncertain: p.uncertain === true || p.uncertain === 'TRUE' || p.uncertain === '1',
      noYear:    p.noYear    === true || p.noYear    === 'TRUE' || p.noYear    === '1'
    }));

    // Normalise gifts → keyed object
    gifts = {};
    rawGifts.forEach(g => {
      gifts[Number(g.id)] = {
        given: g.given === true || g.given === 'TRUE' || g.given === '1',
        what:  String(g.what || '')
      };
    });

    setStatus('idle', '—');
    renderAll();
  } catch(err) {
    if (err.message === 'auth') {
      setStatus('auth-err', '🔑 Wrong passphrase');
    } else {
      setStatus('error', 'Load failed');
      console.error(err);
    }
  } finally {
    document.getElementById('loading-overlay').classList.remove('visible');
  }
}

// ════════════════════════════════════════════════════════════
//  Date / calendar helpers
// ════════════════════════════════════════════════════════════
function parseDob(dob) {
  // dob format: YYYY-MM-DD  or  --MM-DD  or  ""
  if (!dob) return null;
  const parts = dob.split('-');
  if (dob.startsWith('--')) {
    // no year: "--MM-DD"
    return { year: null, month: parseInt(parts[2]), day: parseInt(parts[3]) };
  }
  if (parts.length === 3) {
    return { year: parseInt(parts[0]), month: parseInt(parts[1]), day: parseInt(parts[2]) };
  }
  return null;
}

function calendarKey(dob) {
  const p = parseDob(dob);
  if (!p) return 9999 * 10000;          // unknown → end
  return p.month * 100 + p.day;
}

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun',
                     'Jul','Aug','Sep','Oct','Nov','Dec'];

function formatDob(person) {
  const p = parseDob(person.dob);
  if (!p) return 'Unknown birthday';
  const monthName = MONTH_NAMES[p.month - 1];
  const base = `${monthName} ${p.day}`;
  if (!p.year || person.noYear) return base;
  return `${base}, ${p.year}`;
}

// Days until next birthday (ignores year)
function daysUntil(dob) {
  const p = parseDob(dob);
  if (!p) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  const thisYear = today.getFullYear();
  let next = new Date(thisYear, p.month - 1, p.day);
  next.setHours(0,0,0,0);
  if (next < today) next = new Date(thisYear + 1, p.month - 1, p.day);
  return Math.round((next - today) / 86400000);
}

function age(person) {
  const p = parseDob(person.dob);
  if (!p || !p.year || person.noYear) return null;
  const today = new Date();
  let a = today.getFullYear() - p.year;
  if (today.getMonth() + 1 < p.month ||
      (today.getMonth() + 1 === p.month && today.getDate() < p.day)) a--;
  return a;
}

// ════════════════════════════════════════════════════════════
//  Render helpers
// ════════════════════════════════════════════════════════════
function renderCard(person) {
  const d      = daysUntil(person.dob);
  const gift   = gifts[person.id] || { given: false, what: '' };
  const ageVal = age(person);

  let daysBadge = '';
  if (d !== null) {
    if (d === 0)       daysBadge = `<span class="days-badge today">Today! 🎉</span>`;
    else if (d <= 7)   daysBadge = `<span class="days-badge soon">in ${d}d</span>`;
    else if (d <= 14)  daysBadge = `<span class="days-badge soon">in ${d}d</span>`;
    else if (d <= 30)  daysBadge = `<span class="days-badge past">in ${d}d</span>`;
  }

  const uncertainFlag = person.uncertain
    ? `<span class="uncertain-flag">~approx</span>` : '';

  const ageStr = ageVal !== null
    ? `<div class="card-age">Turning ${ageVal + (d === 0 ? 0 : 1)}</div>` : '';

  const giftNotesHtml = `
    <div class="gift-notes-area${gift.given ? ' open' : ''}" id="notes-area-${person.id}">
      <textarea placeholder="Gift notes…" id="notes-${person.id}"
        onchange="saveGift(${person.id})"
      >${escHtml(gift.what)}</textarea>
    </div>`;

  return `
  <div class="person-card" id="card-${person.id}">
    <div class="card-row">
      <div class="card-info">
        <div class="card-name">${escHtml(person.name)}${uncertainFlag}</div>
        <div class="card-date">${formatDob(person)}${daysBadge}</div>
        ${ageStr}
      </div>
      <div class="card-actions">
        <button class="gift-toggle${gift.given ? ' given' : ''}"
          id="gift-btn-${person.id}"
          onclick="toggleGift(${person.id})">
          ${gift.given ? '🎁 Given' : '🎁 Give'}
        </button>
        <button class="btn-icon delete" title="Delete" onclick="deletePerson(${person.id})">✕</button>
      </div>
    </div>
    ${giftNotesHtml}
  </div>`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderList(container, list) {
  if (!list.length) {
    container.innerHTML = `<div class="empty-state"><div class="big">🎈</div>No one here yet.</div>`;
    return;
  }
  container.innerHTML = list.map(renderCard).join('');
}

function renderAll() {
  const sorted = [...people].sort((a,b) => calendarKey(a.dob) - calendarKey(b.dob));

  const kids   = sorted.filter(p => p.group === 'kids');
  const adults = sorted.filter(p => p.group === 'adults');

  renderList(document.getElementById('list-kids'),   kids);
  renderList(document.getElementById('list-adults'), adults);
  document.getElementById('count-kids').textContent   = kids.length;
  document.getElementById('count-adults').textContent = adults.length;

  // Coming up (60 days)
  const coming = sorted.filter(p => {
    const d = daysUntil(p.dob);
    return d !== null && d <= 60;
  }).sort((a,b) => daysUntil(a.dob) - daysUntil(b.dob));
  renderList(document.getElementById('list-coming'), coming);
  document.getElementById('count-coming').textContent = coming.length;

  renderGiftsTab();
}

function renderGiftsTab() {
  let given = 0, todo = 0;
  const givenItems = [], todoItems = [];

  [...people].sort((a,b) => calendarKey(a.dob) - calendarKey(b.dob)).forEach(p => {
    const g = gifts[p.id] || { given: false, what: '' };
    if (g.given) {
      given++;
      givenItems.push(`<div class="gift-list-item">
        <span class="gi-check">🎁</span>
        <div><div class="gi-name">${escHtml(p.name)}</div>
        ${g.what ? `<div class="gi-note">${escHtml(g.what)}</div>` : ''}</div>
      </div>`);
    } else {
      todo++;
      todoItems.push(`<div class="gift-list-item">
        <span class="gi-check" style="opacity:.3">○</span>
        <div class="gi-name">${escHtml(p.name)}</div>
      </div>`);
    }
  });

  document.getElementById('stat-given').textContent = given;
  document.getElementById('stat-todo').textContent  = todo;
  document.getElementById('gift-list-given').innerHTML =
    givenItems.length ? givenItems.join('') : '<div class="empty-state" style="padding:12px 0">None yet.</div>';
  document.getElementById('gift-list-todo').innerHTML =
    todoItems.length ? todoItems.join('') : '<div class="empty-state" style="padding:12px 0">All done! 🎉</div>';
}

// ════════════════════════════════════════════════════════════
//  Gift interactions
// ════════════════════════════════════════════════════════════
async function toggleGift(id) {
  const g     = gifts[id] || { given: false, what: '' };
  g.given     = !g.given;
  gifts[id]   = g;

  // Update toggle button immediately
  const btn  = document.getElementById(`gift-btn-${id}`);
  const area = document.getElementById(`notes-area-${id}`);
  if (btn)  { btn.classList.toggle('given', g.given); btn.textContent = g.given ? '🎁 Given' : '🎁 Give'; }
  if (area) { area.classList.toggle('open', g.given); }

  renderGiftsTab();
  await saveGift(id);
}

async function saveGift(id) {
  const notesEl = document.getElementById(`notes-${id}`);
  if (!gifts[id]) gifts[id] = { given: false, what: '' };
  if (notesEl) gifts[id].what = notesEl.value;

  setStatus('saving', 'Saving…');
  try {
    await apiPost({ action: 'saveGift', gift: { id, ...gifts[id] } });
    flashSaved();
    renderGiftsTab();
  } catch(err) {
    if (err.message === 'auth') setStatus('auth-err', '🔑 Wrong passphrase');
    else setStatus('error', 'Save failed');
  }
}

// ════════════════════════════════════════════════════════════
//  Delete person
// ════════════════════════════════════════════════════════════
async function deletePerson(id) {
  const person = people.find(p => p.id === id);
  if (!person) return;
  if (!confirm(`Delete ${person.name}?`)) return;

  setStatus('saving', 'Deleting…');
  try {
    await apiPost({ action: 'deletePerson', id });
    people  = people.filter(p => p.id !== id);
    delete gifts[id];
    renderAll();
    flashSaved();
  } catch(err) {
    if (err.message === 'auth') setStatus('auth-err', '🔑 Wrong passphrase');
    else setStatus('error', 'Delete failed');
  }
}

// ════════════════════════════════════════════════════════════
//  Add person modal
// ════════════════════════════════════════════════════════════
function nextId() {
  if (!people.length) return 1;
  return Math.max(...people.map(p => p.id)) + 1;
}

function openModal() {
  document.getElementById('new-name').value = '';
  document.getElementById('new-month').value = '';
  document.getElementById('new-day').value = '';
  document.getElementById('new-year').value = '';
  document.getElementById('new-uncertain').checked = false;
  document.querySelector('input[name="group"][value="kids"]').checked = true;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('new-name').focus();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

async function savePerson() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { alert('Please enter a name.'); return; }

  const group     = document.querySelector('input[name="group"]:checked').value;
  const month     = document.getElementById('new-month').value;
  const day       = document.getElementById('new-day').value;
  const year      = document.getElementById('new-year').value;
  const uncertain = document.getElementById('new-uncertain').checked;

  let dob = '';
  let noYear = false;
  if (month && day) {
    if (year) {
      dob = `${year.padStart(4,'0')}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    } else {
      dob = `--${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      noYear = true;
    }
  }

  const person = { id: nextId(), name, dob, group, uncertain, noYear };

  const saveBtn = document.getElementById('modal-save');
  saveBtn.disabled = true;
  setStatus('saving', 'Saving…');

  try {
    await apiPost({ action: 'savePerson', person });
    people.push(person);
    renderAll();
    closeModal();
    flashSaved();
  } catch(err) {
    if (err.message === 'auth') setStatus('auth-err', '🔑 Wrong passphrase');
    else setStatus('error', 'Save failed');
  } finally {
    saveBtn.disabled = false;
  }
}

// Populate day dropdown based on month selection
function populateDays() {
  const month = parseInt(document.getElementById('new-month').value) || 0;
  const year  = parseInt(document.getElementById('new-year').value)  || 2000;
  const days  = month ? new Date(year, month, 0).getDate() : 31;
  const sel   = document.getElementById('new-day');
  const cur   = sel.value;
  sel.innerHTML = '<option value="">Day</option>';
  for (let i = 1; i <= days; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i;
    sel.appendChild(opt);
  }
  if (cur && parseInt(cur) <= days) sel.value = cur;
}

// Populate year dropdown
function populateYears() {
  const sel = document.getElementById('new-year');
  const cur = new Date().getFullYear();
  sel.innerHTML = '<option value="">Year (optional)</option>';
  for (let y = cur; y >= 1940; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    sel.appendChild(opt);
  }
}

// ════════════════════════════════════════════════════════════
//  Tabs
// ════════════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ════════════════════════════════════════════════════════════
//  Event listeners
// ════════════════════════════════════════════════════════════
document.getElementById('fab-add').addEventListener('click', openModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-save').addEventListener('click', savePerson);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('new-month').addEventListener('change', populateDays);
document.getElementById('new-year').addEventListener('change', populateDays);
document.getElementById('passphrase-input').addEventListener('input', savePassphraseLocally);

// Reload on passphrase Enter
document.getElementById('passphrase-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadAll();
});

// ════════════════════════════════════════════════════════════

populateYears();
populateDays();
loadPassphraseLocally();
loadAll();
</script>
